name: Bug Report
description: Create a report to help us improve
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thank you for taking the time to report a bug. Please provide as much information as possible to help us understand and resolve the issue."

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the SDK is affected?
      options:
        - Rust SDK (goosefs crate)
        - Python binding (bindings/python)
        - Examples / benchmarks
        - CI / Docker GooseFS fixture
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: describe-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Set GOOSEFS_MASTER_ADDR=...
        2. Run ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Explain what you expected to happen...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and runtime details that help reproduce the issue.
      value: |
        - OS:
        - Rustc / cargo (if applicable):
        - Python (if applicable):
        - goosefs crate / wheel version:
        - GooseFS cluster version / image:
        - GOOSEFS_MASTER_ADDR / auth type:
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (logs, backtraces, screenshots, code snippets).
      placeholder: Additional details...
    validations:
      required: false

  - type: checkboxes
    id: willing-to-submit-pr
    attributes:
      label: Are you willing to submit a PR to fix this bug?
      description: Let us know if you are willing to contribute a fix by submitting a Pull Request.
      options:
        - label: Yes, I would like to submit a PR.
