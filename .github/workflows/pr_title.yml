name: PR Title

# Enforces the "[area] Summary" PR-title convention used by this repository.
#
# Why this matters: every PR is squash-merged. On squash-merge, GitHub appends
# the PR number to the (squashed) commit title, e.g.
#     [sdk] Reduce log verbosity (#3700)
# so the final commit links back to its PR -- the same behavior as Apache Fluss.
# The only thing we need to enforce for that to happen is the PR-title format.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_title:
        description: "PR title to validate (used for manual runs only)"
        required: true
        type: string

permissions:
  pull-requests: read
  contents: read

jobs:
  pr-title:
    name: validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check PR title convention
        env:
          PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
        run: python3 scripts/ci/pr_title_check.py "$PR_TITLE"
