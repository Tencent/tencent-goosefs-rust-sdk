[package]
name = "goosefs-sdk"
version = "0.1.4"
edition = "2021"
description = "Goosefs Rust gRPC Client - Direct gRPC client for Goosefs Master/Worker"
license = "Apache-2.0"
authors = ["Goosefs Team"]
readme = "README.md"
repository = "https://git.woa.com/tencent-cloud-datalake/goosefs-client-rust"
homepage = "https://git.woa.com/tencent-cloud-datalake/goosefs-client-rust"
documentation = "https://docs.rs/goosefs-sdk"
keywords = ["goosefs", "grpc", "storage", "filesystem", "cache"]
categories = ["network-programming", "filesystem"]
rust-version = "1.88"
exclude = [
    ".idea/*",
    ".codebuddy/*",
    ".DS_Store",
    "**/.DS_Store",
    "docs/gap/*",
    "docs/design/*",
    "docs/prompt/*",
    "docs/images/*",
    "docs/RELEASE.md",
    "docs/RELEASE_CHECKLIST.md",
    "goosefs-client-rust.code-workspace",
    "target/*",
]

[lib]
name = "goosefs_sdk"

[dependencies]
tonic = { version = "0.14", features = ["transport"] }
tonic-prost = "0.14"
prost = "0.14"
prost-types = "0.14"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
bytes = "1"
thiserror = "2"
tracing = "0.1"
dashmap = "6"
serde = { version = "1", features = ["derive"] }
async-trait = "0.1"
rand = "0.8"
uuid = { version = "1", features = ["v4"] }
hostname = "0.3"
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }

[build-dependencies]
tonic-prost-build = "0.14"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
