# HawkEye config (same tool OpenDAL uses). Prefer scripts/ci/check_license_headers.py
# in CI for a Tencent-header-aware check; keep this file for local `hawkeye check`.
headerPath = "license-header.txt"

excludes = [
  # Locks / generated
  "**/Cargo.lock",
  "**/uv.lock",
  "**/target/**",
  "**/.venv/**",
  "**/__pycache__/**",
  "**/venv/**",

  # Documents
  "**/*.md",
  "**/*.mdx",

  # Root license text and this header template itself
  "LICENSE",
  "license-header.txt",

  # Third-party OpenDAL fixture (keeps ASF header)
  "fixtures/goosefs/bin/start-default.sh",

  # Docusaurus website
  "website/**",
]

keywords = ["copyright", "license"]
