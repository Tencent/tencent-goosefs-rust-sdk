syntax = "proto2";

option java_multiple_files = true;
option java_package = "com.qcloud.cos.goosefs.grpc";
option java_outer_classname = "BlockWorkerProto";

package com.qcloud.cos.goosefs.grpc.block;

import "proto/dataserver/protocol.proto";
import "proto/security/capability_token.proto";
import "grpc/common.proto";

service BlockWorker {
  rpc ReadBlock (stream ReadRequest) returns (stream ReadResponse);
  rpc WriteBlock (stream WriteRequest) returns (stream WriteResponse);
  rpc OpenLocalBlock (stream OpenLocalBlockRequest) returns (stream OpenLocalBlockResponse);
  rpc CreateLocalBlock (stream CreateLocalBlockRequest) returns (stream CreateLocalBlockResponse);
  rpc AsyncCache (AsyncCacheRequest) returns (AsyncCacheResponse);
  rpc RemoveBlock (RemoveBlockRequest) returns (RemoveBlockResponse);
  rpc MoveBlock (MoveBlockRequest) returns (MoveBlockResponse);
  rpc FreeWorker (FreeWorkerRequest) returns (FreeWorkerResponse);
  rpc ClearMetrics (ClearMetricsRequest) returns (ClearMetricsResponse);
  rpc AvoidBlockDeadLock (AvoidBlockDeadLockRequest) returns (AvoidBlockDeadLockResponse);
  rpc SyncCache (SyncCacheRequest) returns (SyncCacheResponse);
  rpc CheckBlocks(CheckBlocksRequest) returns (CheckBlocksResponse);
}

message AvoidBlockDeadLockRequest {
  optional int64 block_id = 1;
}
message AvoidBlockDeadLockResponse {}

message CheckRequest {}
message CheckResponse {}

message Chunk {
  optional bytes data = 1;
}

enum RequestType {
  GOOSEFS_BLOCK = 0;
  UFS_FILE = 1;
  UFS_FALLBACK_BLOCK = 2;
}

message ReadRequest {
  optional int64 block_id = 1;
  optional int64 offset = 2;
  optional int64 length = 3;
  optional int64 chunk_size = 4;
  optional goosefs.proto.dataserver.OpenUfsBlockOptions open_ufs_block_options = 5;
  optional int64 offset_received = 6;
  optional bool position_short = 7;
  optional string request_id = 8;
  optional com.qcloud.cos.goosefs.proto.security.Capability capability = 9;
  optional int64 block_size = 10;
  optional int32 prefetch_window = 11;
}

message ReadResponse {
  optional Chunk chunk = 1;
}

message WriteRequestCommand {
  optional RequestType type = 1;
  optional int64 id = 2;
  optional int64 offset = 3;
  optional bool flush = 4;
  optional goosefs.proto.dataserver.CreateUfsFileOptions create_ufs_file_options = 5;
  optional int64 space_to_reserve = 6;
  optional com.qcloud.cos.goosefs.proto.security.Capability capability = 7;
  optional string medium_type = 8;
}

message WriteRequest {
  oneof value {
    WriteRequestCommand command = 1;
    Chunk chunk = 2;
  }
}

message WriteResponse {
  optional int64 offset = 1;
}

message AsyncCacheRequest {
  optional int64 block_id = 1;
  optional string source_host = 2;
  optional int32 source_port = 3;
  optional goosefs.proto.dataserver.OpenUfsBlockOptions open_ufs_block_options = 4;
  optional int64 length = 5;
  optional int64 offset = 6;
}
message AsyncCacheResponse {}

message SyncCacheRequest {
  optional int64 block_id = 1;
  optional string source_host = 2;
  optional int32 source_port = 3;
  optional goosefs.proto.dataserver.OpenUfsBlockOptions open_ufs_block_options = 4;
  optional int64 length = 5;
  optional int64 offset = 6;
}
message SyncCacheResponse {
  optional bool result = 1;
}

message OpenLocalBlockRequest {
  optional int64 block_id = 1;
  optional com.qcloud.cos.goosefs.proto.security.Capability capability = 2;
  optional int64 block_size = 3;
}
message OpenLocalBlockResponse {
  optional string path = 1;
  optional int64 blockSize = 2;
}

message CreateLocalBlockRequest {
  optional int64 block_id = 1;
  optional int32 tier = 2;
  optional int64 space_to_reserve = 3;
  optional bool only_reserve_space = 4;
  optional com.qcloud.cos.goosefs.proto.security.Capability capability = 5;
  optional string medium_type = 6;
}
message CreateLocalBlockResponse {
  optional string path = 1;
}

message RemoveBlockRequest {
  optional int64 block_id = 1;
}
message RemoveBlockResponse {}

message MoveBlockRequest {
  optional int64 block_id = 1;
  optional string medium_type = 2;
}
message MoveBlockResponse {}

message ClearMetricsRequest {}
message ClearMetricsResponse {}

message FreeWorkerRequest {}
message FreeWorkerResponse {}

message CheckBlocksRequest {
  repeated int64 block_ids = 1;
}
message CheckBlocksResponse {
  map<int64, bool> block_exists = 1;
}

message Block {
  required int64 block_id = 1;
  required int64 length = 2;
  optional string ufs_path = 3;
  optional int64 offset_in_file = 4;
  optional int64 mountId = 5;
}

message BlockStatus {
  required Block block = 1;
  required int32 code = 2;
  optional string message = 3;
  optional bool retryable = 4;
}

message UfsReadOptions {
  required string tag = 1;
  required bool position_short = 2;
  optional int64 bandwidth = 3;
  optional string user = 4;
}
